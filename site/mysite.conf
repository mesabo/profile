</head>
<body>
<button id="theme-toggle" type="button" aria-label="Toggle light / dark theme" title="Toggle light / dark">
  <span class="theme-icon-light">☀</span>
  <span class="theme-icon-dark">☾</span>
</button>
<script>
  (function () {
    var btn = document.getElementById('theme-toggle');
    if (btn) {
      btn.addEventListener('click', function () {
        var cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
        var next = cur === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('theme', next); } catch (e) {}
      });
    }
    // tag <body> with the current page slug (drives the top accent band)
    var current = document.querySelector('.menu-item a.current');
    if (current) {
      var href = (current.getAttribute('href') || '').replace('.html', '').replace(/[^a-z0-9]/gi, '');
      if (href) document.body.classList.add('page-' + href);
    }
    // mark language-section menu items so we can grayscale non-current flags
    var inLang = false;
    var nodes = document.querySelectorAll('#layout-menu-inner > div');
    var langLabels = ['language', 'langue', '言語'];
    nodes.forEach(function (el) {
      if (el.classList.contains('menu-category')) {
        inLang = langLabels.indexOf(el.textContent.trim().toLowerCase()) !== -1;
      } else if (inLang && el.classList.contains('menu-item')) {
        el.classList.add('menu-item-lang');
      }
    });
  })();
</script>

